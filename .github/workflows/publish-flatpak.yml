name: Publish Flatpak

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-oci:
    name: Build Flatpak OCI
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - name: Setup subproject
        run: |
          mkdir -p subprojects
          git clone --depth 1 https://github.com/hanthor/suite-common.git subprojects/suite-common
      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: net.codelogistics.letters.json
          cache-key: flatpak-builder-${{ github.sha }}
          build-bundle: false
          upload-artifact: false
      - name: Export OCI
        run: |
          flatpak build-bundle --oci --arch=x86_64 repo letters.oci net.codelogistics.letters
      - name: Upload OCI artifact
        uses: actions/upload-artifact@v4
        with:
          name: letters-oci
          path: letters.oci/
          retention-days: 1

  publish:
    name: Publish to GHCR
    needs: build-oci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: letters-oci
          path: letters.oci
      - name: Push to GHCR
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "${{ secrets.GITHUB_TOKEN }}" | skopeo login ghcr.io -u "${{ github.actor }}" --password-stdin
          skopeo copy oci:letters.oci docker://ghcr.io/${REPO}:latest
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            skopeo copy oci:letters.oci docker://ghcr.io/${REPO}:${{ github.ref_name }}
          fi
      - name: Generate flatpakrepo
        run: |
          REPO="${{ github.repository }}"
          OWNER="${REPO%%/*}"
          NAME="${REPO##*/}"
          mkdir -p pages
          cat > pages/letters.flatpakrepo << EOF
          [Flatpak Repo]
          Title=TunaOS Flatpaks — Letters
          Url=oci+https://${OWNER}.github.io/${NAME}
          Homepage=https://github.com/${REPO}
          Comment=TunaOS Flatpak repository for Letters
          Description=Word processor for GNOME
          EOF
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: pages
          keep_files: true
